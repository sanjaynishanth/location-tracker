<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Field Tracker — Live Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #layout { display: flex; height: 100%; }
  #sidebar {
    width: 300px; min-width: 300px; background: #14181f; color: #e8eaed;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar header { padding: 14px 16px; border-bottom: 1px solid #262c36; }
  #sidebar header h1 { font-size: 16px; font-weight: 600; }
  #sidebar header .sub { font-size: 12px; color: #8a919e; margin-top: 2px; }
  #userlist { flex: 1; overflow-y: auto; padding: 8px; }
  .user-card {
    padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 6px;
    background: #1c222c; border: 1px solid transparent;
  }
  .user-card:hover { background: #232a36; }
  .user-card.selected { border-color: #4d8dff; }
  .user-card .row1 { display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.fresh { background: #34c759; }
  .dot.warn  { background: #ff9f0a; }
  .dot.stale { background: #ff453a; }
  .user-card .name { font-weight: 600; font-size: 14px; }
  .user-card .meta { font-size: 12px; color: #8a919e; margin-top: 4px; }
  .user-card .meta .low-batt { color: #ff453a; font-weight: 600; }
  #footer { padding: 10px 16px; font-size: 11px; color: #8a919e; border-top: 1px solid #262c36; }
  #footer a { color: #4d8dff; cursor: pointer; text-decoration: none; }
  #map { flex: 1; }
  .marker-pin {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 50%;
    color: #fff; font-weight: 700; font-size: 14px;
    border: 3px solid #fff; box-shadow: 0 1px 6px rgba(0,0,0,.4);
  }
  .marker-pin.fresh { background: #2da44e; }
  .marker-pin.warn  { background: #e8890c; }
  .marker-pin.stale { background: #d1242f; }
  #empty { padding: 24px 16px; color: #8a919e; font-size: 13px; line-height: 1.5; }
  /* API key overlay */
  #keyOverlay {
    position: fixed; inset: 0; background: rgba(10,12,16,.85);
    display: flex; align-items: center; justify-content: center; z-index: 2000;
  }
  #keyOverlay .box {
    background: #1c222c; color: #e8eaed; padding: 28px; border-radius: 12px;
    width: 340px; box-shadow: 0 8px 40px rgba(0,0,0,.5);
  }
  #keyOverlay h2 { font-size: 16px; margin-bottom: 6px; }
  #keyOverlay p { font-size: 13px; color: #8a919e; margin-bottom: 14px; }
  #keyOverlay input {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #363e4c;
    background: #14181f; color: #e8eaed; font-size: 14px; margin-bottom: 12px;
  }
  #keyOverlay button {
    width: 100%; padding: 10px; border: 0; border-radius: 8px; background: #4d8dff;
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #keyError { color: #ff453a; font-size: 12px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>
<div id="keyOverlay">
  <div class="box">
    <h2>Field Tracker Dashboard</h2>
    <p>Enter the API key (same value as API_KEY in the backend .env file).</p>
    <div id="keyError">Wrong key, try again.</div>
    <input id="keyInput" type="password" placeholder="API key" autofocus>
    <button onclick="submitKey()">Open dashboard</button>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <header>
      <h1>Field Tracker</h1>
      <div class="sub" id="statusLine">Connecting…</div>
    </header>
    <div id="userlist"></div>
    <div id="footer">
      Auto-refreshes every 10 s · <a onclick="changeKey()">change key</a>
    </div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const KEY_STORAGE = 'tracker_api_key';
let apiKey = localStorage.getItem(KEY_STORAGE) || '';
let map, markers = {}, historyLine = null, selectedId = null, didFit = false;

function initMap() {
  map = L.map('map').setView([20.5937, 78.9629], 5); // India
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
}

function freshness(lastSeenIso) {
  const mins = (Date.now() - new Date(lastSeenIso).getTime()) / 60000;
  if (mins < 5) return 'fresh';
  if (mins < 15) return 'warn';
  return 'stale';
}

function agoText(lastSeenIso) {
  const mins = Math.floor((Date.now() - new Date(lastSeenIso).getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + ' min ago';
  const h = Math.floor(mins / 60);
  if (h < 24) return h + ' h ' + (mins % 60) + ' min ago';
  return Math.floor(h / 24) + ' d ago';
}

async function api(path) {
  const res = await fetch(path, { headers: { 'X-API-Key': apiKey } });
  if (res.status === 401) throw new Error('unauthorized');
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function makeIcon(name, cls) {
  const letter = (name || '?').trim().charAt(0).toUpperCase();
  return L.divIcon({
    className: '',
    html: `<div class="marker-pin ${cls}">${letter}</div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17],
  });
}

async function refreshUsers() {
  let users;
  try {
    users = await api('/api/v1/users');
    document.getElementById('statusLine').textContent =
      users.length + ' device(s) · updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    if (e.message === 'unauthorized') { showKeyOverlay(true); return; }
    document.getElementById('statusLine').textContent = 'Server unreachable — retrying…';
    return;
  }

  const list = document.getElementById('userlist');
  list.innerHTML = '';
  if (users.length === 0) {
    list.innerHTML = '<div id="empty">No devices yet.<br><br>Install the app on a phone, enter this server URL and API key, and switch tracking ON.</div>';
    return;
  }

  const bounds = [];
  const seen = new Set();
  for (const u of users) {
    seen.add(u.device_id);
    const cls = freshness(u.last_seen);

    // sidebar card
    const card = document.createElement('div');
    card.className = 'user-card' + (u.device_id === selectedId ? ' selected' : '');
    const batt = u.battery == null ? '' :
      ` · <span class="${u.battery <= 20 ? 'low-batt' : ''}">🔋 ${u.battery}%</span>`;
    card.innerHTML = `
      <div class="row1"><span class="dot ${cls}"></span><span class="name"></span></div>
      <div class="meta">${agoText(u.last_seen)}${batt}</div>`;
    card.querySelector('.name').textContent = u.name;
    card.onclick = () => selectUser(u);
    list.appendChild(card);

    // map marker
    const pos = [u.lat, u.lng];
    bounds.push(pos);
    if (markers[u.device_id]) {
      markers[u.device_id].setLatLng(pos).setIcon(makeIcon(u.name, cls));
    } else {
      markers[u.device_id] = L.marker(pos, { icon: makeIcon(u.name, cls) }).addTo(map);
    }
    markers[u.device_id].bindTooltip(`${u.name} — ${agoText(u.last_seen)}`);
  }

  // drop markers for users that disappeared
  for (const id of Object.keys(markers)) {
    if (!seen.has(id)) { map.removeLayer(markers[id]); delete markers[id]; }
  }

  if (!didFit && bounds.length) {
    map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15 });
    didFit = true;
  }
}

async function selectUser(u) {
  selectedId = u.device_id;
  map.setView([u.lat, u.lng], Math.max(map.getZoom(), 14));
  try {
    const h = await api(`/api/v1/users/${encodeURIComponent(u.device_id)}/history?hours=12`);
    if (historyLine) map.removeLayer(historyLine);
    const pts = h.points.map(p => [p.lat, p.lng]);
    if (pts.length > 1) {
      historyLine = L.polyline(pts, { color: '#4d8dff', weight: 4, opacity: .8 }).addTo(map);
    }
  } catch (e) { /* history is best-effort */ }
  refreshUsers();
}

function showKeyOverlay(wasWrong) {
  document.getElementById('keyError').style.display = wasWrong ? 'block' : 'none';
  document.getElementById('keyOverlay').style.display = 'flex';
  document.getElementById('keyInput').focus();
}

function submitKey() {
  apiKey = document.getElementById('keyInput').value.trim();
  localStorage.setItem(KEY_STORAGE, apiKey);
  document.getElementById('keyOverlay').style.display = 'none';
  refreshUsers();
}

function changeKey() {
  localStorage.removeItem(KEY_STORAGE);
  showKeyOverlay(false);
}

document.getElementById('keyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitKey();
});

initMap();
if (apiKey) {
  document.getElementById('keyOverlay').style.display = 'none';
  refreshUsers();
} else {
  showKeyOverlay(false);
}
setInterval(refreshUsers, 10000);
</script>
</body>
</html>
